name: Build iOS ipa

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest # Use a macOS runner for iOS builds

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Get your project code

      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > ios/ExportOptions.plist
          ${{ secrets.EXPORT_OPTION_PLIST }}
          EOF
        # This step dynamically creates the ExportOptions.plist from a secret,
        # which should contain the content of your ExportOptions.plist file.

      - name: Build iOS App
        uses: cedvdb/action-flutter-build-ios@v1 # Example action for Flutter, adjust for native iOS
        with:
          build-cmd: flutter build ipa --export-options-plist=ios/ExportOptions.plist # Example build command
          certificate-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          certificate-password: ${{ secrets.P12_PASSWORD }}
          provisioning-profile-base64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
        # This action handles signing and building the IPA.
        # You would use a different action or custom script for native iOS projects.
        # For native iOS, consider actions like 'Build iOS Action' from the GitHub Marketplace.

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: build/ios/ipa/*.ipa # Adjust path based on your build output
