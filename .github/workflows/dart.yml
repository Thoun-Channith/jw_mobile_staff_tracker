name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v3

      # Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3' # match your Flutter version
          channel: 'stable'
          architecture: x64

      # Install Flutter deps
      - run: flutter pub get

      # Clean Pods + DerivedData to avoid cache issues
      - run: |
          rm -rf ios/Pods ios/Podfile.lock ~/Library/Developer/Xcode/DerivedData
          pod install --repo-update
        working-directory: ios

      # Build iOS app (unsigned)
      - run: flutter build ios --release --no-codesign

      # Package Runner.app into AltStore-compatible IPA
      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r StaffTrackingApp.ipa Payload
          mv StaffTrackingApp.ipa ../../StaffTrackingApp.ipa

      # Upload IPA as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/StaffTrackingApp.ipa

      # (Optional) Upload to GitHub release
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/StaffTrackingApp.ipa
          tag: v1.0
          overwrite: true
          body: "Unsigned iOS IPA build for AltStore"
