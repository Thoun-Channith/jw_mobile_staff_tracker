name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3' # match your local flutter version
          channel: 'stable'
          architecture: x64

      - run: flutter pub get

      # Clean Pods + DerivedData to avoid cache issues
      - run: |
          rm -rf ios/Pods ios/Podfile.lock ~/Library/Developer/Xcode/DerivedData
          pod install --repo-update
        working-directory: ios

      # Build iOS app (unsigned)
      - run: flutter build ios --release --no-codesign

      # Package Runner.app into IPA manually (since no codesign skips IPA export)
      - run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r Runner.ipa Payload

      # Upload IPA as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/Runner.ipa

      # (Optional) Upload to GitHub release
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/ipa/Runner.ipa
          tag: v1.0
          overwrite: true
          body: "Unsigned iOS IPA build"
